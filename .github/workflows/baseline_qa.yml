name: Baseline QA Automation

on:
  push:
    branches: [ master, develop, feature/*, phase* ]
    paths:
      - 'modules/gaussian_splatting/**'
      - 'tests/**'
      - 'test_*.gd'
      - '.github/workflows/baseline_qa.yml'
  pull_request:
    branches: [ master, develop ]
  merge_group:
    types: [checks_requested]
  schedule:
    # Nightly baseline refresh run at 03:30 UTC.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode with detailed logging'
        required: false
        default: false
        type: boolean
      baseline_mode:
        description: 'QA baseline mode (compare against stored baseline or refresh it)'
        required: false
        default: compare
        type: choice
        options:
          - compare
          - update

env:
  GODOT_BINARY: "godot"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: baseline-qa-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gpu-tests:
    name: GPU QA Tests (Windows Self-Hosted)
    runs-on: [self-hosted, Windows, X64, godotgs, gpu]
    timeout-minutes: 120

    defaults:
      run:
        working-directory: repo
        shell: pwsh

    steps:
    - name: Configure Git safe.directory
      working-directory: ${{ github.workspace }}
      run: |
        git config --global --add safe.directory '*'

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: repo
        fetch-depth: 0
        submodules: recursive
        set-safe-directory: false

    - name: Verify Python
      run: |
        python --version

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install SCons
      run: |
        python -m pip install --upgrade pip
        python -m pip install scons numpy pillow

    - name: Build module-enabled Godot editor
      run: |
        python -m SCons platform=windows target=editor dev_build=yes tests=yes gs_native_arch=no cache_path=C:/godotgs-scons-cache cache_limit=50 -j12

    - name: Resolve Godot binary
      id: godot_binary
      run: |
        $candidates = @(
          "bin\godot.windows.editor.dev.x86_64.console.exe",
          "bin\godot.windows.editor.dev.x86_64.exe",
          "bin\godot.windows.editor.x86_64.console.exe",
          "bin\godot.windows.editor.x86_64.exe"
        )
        $resolved = $null
        foreach ($candidate in $candidates) {
          if (Test-Path -LiteralPath $candidate) {
            $resolved = (Resolve-Path -LiteralPath $candidate).Path
            break
          }
        }
        if (-not $resolved) {
          throw "Could not find built Godot binary in expected bin\ paths."
        }
        Write-Host "Resolved Godot binary: $resolved"
        "path=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "GODOT_BINARY=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Resolve baseline mode
      id: baseline_mode
      run: |
        $mode = "compare"
        $reason = "default-compare"
        if ("${{ github.event_name }}" -eq "schedule") {
          $mode = "update"
          $reason = "nightly-schedule-update"
        } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.baseline_mode }}" -eq "update") {
          $mode = "update"
          $reason = "manual-update"
        }
        "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Resolved baseline mode: $mode ($reason)"

    - name: Run GPU sorting fast gate
      env:
        GS_CI_GPU_REQUIRED: "1"
        GS_CI_VALIDATION_MODE: "strict"
      run: |
        $args = @(
          "--categories", "sorting",
          "--godot", $env:GODOT_BINARY
        )
        python tests/ci/run_baseline_qa.py @args

    - name: Upload GPU test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: baseline-qa-gpu-results
        path: |
          repo/baseline_qa_results.json
          repo/tests/ci/qa_results.json
          repo/*test_results.json
          repo/*.log
        if-no-files-found: warn
        retention-days: 30

    - name: Post GPU test summary
      if: always()
      run: |
        $summaryFile = $env:GITHUB_STEP_SUMMARY
        "# GPU Baseline Test Results" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "- Trigger: ``${{ github.event_name }}``" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "- Baseline mode: ``${{ steps.baseline_mode.outputs.mode }}`` (${{ steps.baseline_mode.outputs.reason }})" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append

        if (Test-Path "baseline_qa_results.json") {
          $data = Get-Content "baseline_qa_results.json" -Raw | ConvertFrom-Json
          "## Test Summary" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Metric | Value |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "|--------|-------|" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Total Tests | $($data.total_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Passed | $($data.passed_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "| Failed | $($data.failed_tests) |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          if ($data.total_tests -gt 0) {
            $rate = [math]::Round($data.passed_tests / $data.total_tests * 100, 1)
            "| Success Rate | ${rate}% |" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          }
          "" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          "## Test Details" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          foreach ($test in $data.tests) {
            $status = if ($test.success) { "PASS" } else { "FAIL" }
            $duration = [math]::Round($test.duration, 1)
            "- $status **$($test.name)** (${duration}s)" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
          }
        } else {
          "Test results file not found" | Out-File -FilePath $summaryFile -Encoding utf8 -Append
        }

  gpu-harness:
    name: GPU Harness + Visual Gate (Windows Self-Hosted)
    runs-on: [self-hosted, Windows, X64, godotgs, gpu]
    # Runs after gpu-tests so the two GPU jobs serialize on the shared runner
    # and split the scons cache cleanly. Independent of gpu-tests' result —
    # a failing GDScript-based gpu-test should not gate the doctest-based
    # visual gate.
    needs: gpu-tests
    if: ${{ !cancelled() }}
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: repo
        shell: pwsh

    steps:
      - name: Configure Git safe.directory
        working-directory: ${{ github.workspace }}
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: false
          # Update-mode runs push baseline changes back through a PR; everything
          # else stays on the workflow's default token.
          token: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.baseline_mode == 'update')) && secrets.BASELINE_UPDATE_PAT || secrets.GITHUB_TOKEN }}

      - name: Decide whether GPU harness should run
        id: path_filter
        uses: actions/github-script@v7
        with:
          script: |
            const fallbackLabel = "ci/gpu-runner-unavailable";
            let runHarness = true;
            let reason = "default-run";

            if (context.eventName === "schedule" || context.eventName === "push" || context.eventName === "workflow_dispatch") {
              reason = `event:${context.eventName}`;
            } else if (context.eventName === "pull_request" || context.eventName === "merge_group") {
              const renderPrefixes = [
                "modules/gaussian_splatting/renderer/",
                "modules/gaussian_splatting/shaders/",
                "modules/gaussian_splatting/interfaces/",
                "modules/gaussian_splatting/tests/",
                "tests/visual_baselines/",
                "modules/gaussian_splatting/SCsub",
                "modules/gaussian_splatting/register_types.cpp",
                "main/main.cpp",
                "tests/ci/run_gpu_harness.py",
                ".github/workflows/baseline_qa.yml",
              ];

              let changedPaths = [];
              if (context.eventName === "pull_request") {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                });
                changedPaths = files.map((f) => String(f.filename || ""));
              } else {
                const base = context.payload.merge_group.base_sha;
                const head = context.payload.merge_group.head_sha;
                const compare = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${base}...${head}`,
                  per_page: 100,
                });
                changedPaths = (compare.data.files || []).map((f) => String(f.filename || ""));
              }

              runHarness = changedPaths.some((p) =>
                renderPrefixes.some((prefix) => p.startsWith(prefix))
              );
              reason = runHarness ? "render-path-change" : "no-render-changes";

              let labels = [];
              if (context.eventName === "pull_request") {
                labels = (context.payload.pull_request.labels || []).map((l) => l.name);
              }
              if (runHarness && labels.includes(fallbackLabel)) {
                runHarness = false;
                reason = `fallback-label:${fallbackLabel}`;
              }
            }

            core.info(`run_harness=${runHarness} reason=${reason}`);
            core.setOutput("run_harness", runHarness ? "true" : "false");
            core.setOutput("reason", reason);

      - name: Report decision
        run: |
          Write-Host "run_harness=${{ steps.path_filter.outputs.run_harness }}"
          Write-Host "reason=${{ steps.path_filter.outputs.reason }}"

      - name: Verify Python
        if: steps.path_filter.outputs.run_harness == 'true'
        run: python --version

      - name: Set up MSVC
        if: steps.path_filter.outputs.run_harness == 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SCons + Python deps
        if: steps.path_filter.outputs.run_harness == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install scons numpy pillow

      - name: Build module-enabled Godot editor (tests=yes)
        if: steps.path_filter.outputs.run_harness == 'true'
        run: |
          python -m SCons platform=windows target=editor dev_build=yes tests=yes `
            module_gaussian_splatting_enabled=yes `
            cache_path=C:/godotgs-scons-cache cache_limit=50 -j12

      - name: Resolve Godot binary
        if: steps.path_filter.outputs.run_harness == 'true'
        id: godot_binary
        run: |
          $candidates = @(
            "bin\godot.windows.editor.dev.x86_64.console.exe",
            "bin\godot.windows.editor.dev.x86_64.exe",
            "bin\godot.windows.editor.x86_64.console.exe",
            "bin\godot.windows.editor.x86_64.exe"
          )
          $resolved = $null
          foreach ($candidate in $candidates) {
            if (Test-Path -LiteralPath $candidate) {
              $resolved = (Resolve-Path -LiteralPath $candidate).Path
              break
            }
          }
          if (-not $resolved) { throw "Could not find built Godot binary in bin\." }
          Write-Host "Resolved Godot binary: $resolved"
          "GODOT_BINARY=$resolved" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve baseline mode
        if: steps.path_filter.outputs.run_harness == 'true'
        id: baseline_mode
        run: |
          $mode = "compare"; $reason = "default-compare"
          if ("${{ github.event_name }}" -eq "schedule") {
            $mode = "update"; $reason = "nightly-schedule-update"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.baseline_mode }}" -eq "update") {
            $mode = "update"; $reason = "manual-update"
          }
          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Record runner provenance
        if: steps.path_filter.outputs.run_harness == 'true'
        run: |
          $gpu = Get-CimInstance Win32_VideoController | Select-Object -First 1
          $os_info = Get-CimInstance Win32_OperatingSystem
          $head_sha = (git -C . rev-parse HEAD).Trim()
          $info = [ordered]@{
            gpu = if ($gpu) { $gpu.Name } else { "unknown" }
            driver = if ($gpu) { $gpu.DriverVersion } else { "unknown" }
            runner_id = $env:RUNNER_NAME
            runner_os_build = $os_info.BuildNumber
            timestamp_utc = (Get-Date).ToUniversalTime().ToString("o")
            baseline_mode = "${{ steps.baseline_mode.outputs.mode }}"
            baseline_mode_reason = "${{ steps.baseline_mode.outputs.reason }}"
            harness_commit = $head_sha
            github_run_id = $env:GITHUB_RUN_ID
            github_event = $env:GITHUB_EVENT_NAME
          }
          $info | ConvertTo-Json | Out-File -FilePath "tests/visual_baselines/.provenance.json" -Encoding utf8
          Write-Host "Provenance:"
          Get-Content "tests/visual_baselines/.provenance.json"

      - name: Run GPU harness
        if: steps.path_filter.outputs.run_harness == 'true'
        env:
          GS_CI_GPU_REQUIRED: "1"
          GS_VISUAL_BASELINE_MODE: ${{ steps.baseline_mode.outputs.mode }}
        run: |
          python tests/ci/run_gpu_harness.py `
            --godot $env:GODOT_BINARY `
            --report tests/ci/gpu_harness_report.json

      - name: Upload visual diff artifacts (compare mode)
        if: always() && steps.path_filter.outputs.run_harness == 'true' && steps.baseline_mode.outputs.mode == 'compare'
        uses: actions/upload-artifact@v4
        with:
          name: gpu-harness-visual-diffs
          path: |
            repo/tests/visual_baselines/**/*.actual.png
            repo/tests/visual_baselines/.provenance.json
            repo/tests/ci/gpu_harness_report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload regenerated baselines (update mode)
        if: always() && steps.path_filter.outputs.run_harness == 'true' && steps.baseline_mode.outputs.mode == 'update'
        uses: actions/upload-artifact@v4
        with:
          name: gpu-harness-recaptured-baselines
          path: |
            repo/tests/visual_baselines/**/*.png
            repo/tests/visual_baselines/.provenance.json
            repo/tests/ci/gpu_harness_report.json
          if-no-files-found: warn
          retention-days: 90

      - name: Open recapture PR
        if: success() && steps.path_filter.outputs.run_harness == 'true' && steps.baseline_mode.outputs.mode == 'update'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BASELINE_UPDATE_PAT }}
          path: repo
          branch: ci/baseline-recapture/${{ github.run_id }}
          base: master
          commit-message: |
            visual_baselines: recapture from run ${{ github.run_id }}

            Trigger: ${{ github.event_name }} (${{ steps.baseline_mode.outputs.reason }})
            Provenance is in the gpu-harness-recaptured-baselines artifact
            and (after merge) in tests/visual_baselines/.provenance.json.
          title: "visual_baselines: scheduled recapture (${{ github.run_id }})"
          body: |
            Automated baseline recapture from `baseline_qa.yml` run ${{ github.run_id }}.
            Provenance JSON is attached to the `gpu-harness-recaptured-baselines`
            workflow artifact for this run.

            **Reviewer checklist:**
            - [ ] Diffs are within sub-LSB rendering tolerances (no functional regression).
            - [ ] Driver/GPU change documented per `tests/visual_baselines/README.md`.
            - [ ] No new PNGs exceed the 256x256 fixture-size guideline unless justified.
          add-paths: |
            tests/visual_baselines/*.png
          delete-branch: true

      - name: Append GPU harness summary
        if: always() && steps.path_filter.outputs.run_harness == 'true'
        run: |
          $summaryFile = $env:GITHUB_STEP_SUMMARY
          "## GPU Harness + Visual Gate" | Out-File -Append -FilePath $summaryFile -Encoding utf8
          "" | Out-File -Append -FilePath $summaryFile -Encoding utf8
          "- Mode: ``${{ steps.baseline_mode.outputs.mode }}`` (${{ steps.baseline_mode.outputs.reason }})" `
            | Out-File -Append -FilePath $summaryFile -Encoding utf8
          if (Test-Path "tests/visual_baselines/.provenance.json") {
            $p = Get-Content "tests/visual_baselines/.provenance.json" -Raw | ConvertFrom-Json
            "- GPU: $($p.gpu)" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "- Driver: $($p.driver)" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "- Runner: $($p.runner_id)" | Out-File -Append -FilePath $summaryFile -Encoding utf8
          }
          if (Test-Path "tests/ci/gpu_harness_report.json") {
            $r = Get-Content "tests/ci/gpu_harness_report.json" -Raw | ConvertFrom-Json
            "" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Metric | Value |" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "|---|---|" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Test cases | $($r.totals.test_cases_passed)/$($r.totals.test_cases_total) |" `
              | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Assertions | $($r.totals.assertions_passed)/$($r.totals.assertions_total) |" `
              | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Wall seconds | $($r.wall_seconds) |" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Supervisor exit | $($r.supervisor_exit) |" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "### Per-batch breakdown" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "| Batch | RC | Cases | Asserts | Status | Wall (s) |" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "|---|---|---|---|---|---|" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            foreach ($b in $r.batches) {
              "| $($b.name) | $($b.rc) | $($b.test_cases.passed)/$($b.test_cases.total) | $($b.assertions.passed)/$($b.assertions.total) | $($b.status) | $($b.wall_seconds) |" `
                | Out-File -Append -FilePath $summaryFile -Encoding utf8
            }
            if ($r.totals.test_cases_failed -gt 0 -or $r.totals.assertions_failed -gt 0) {
              $actuals = Get-ChildItem "tests/visual_baselines" -Filter "*.actual.png" -ErrorAction SilentlyContinue
              if ($actuals) {
                "" | Out-File -Append -FilePath $summaryFile -Encoding utf8
                "**Visual-diff captures: $($actuals.Count)** (see ``gpu-harness-visual-diffs`` artifact)" `
                  | Out-File -Append -FilePath $summaryFile -Encoding utf8
              }
            }
          } else {
            "" | Out-File -Append -FilePath $summaryFile -Encoding utf8
            "*No gpu_harness_report.json was produced — the harness may have crashed before writing the report.*" `
              | Out-File -Append -FilePath $summaryFile -Encoding utf8
          }

      - name: Report skipped run
        if: steps.path_filter.outputs.run_harness != 'true'
        run: |
          $summaryFile = $env:GITHUB_STEP_SUMMARY
          "## GPU Harness + Visual Gate" | Out-File -Append -FilePath $summaryFile -Encoding utf8
          "Skipped: ${{ steps.path_filter.outputs.reason }}" | Out-File -Append -FilePath $summaryFile -Encoding utf8

  cpu-tests:
    name: CPU-Only QA Tests (Linux)
    # Skip the slow Linux build on PRs — Windows self-hosted is the fast gate.
    # Runs on push to master/develop, nightly schedule, and manual dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow

    - name: Install build and runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          scons \
          pkg-config \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libxi-dev \
          libxrandr-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libasound2-dev \
          libpulse-dev \
          libudev-dev \
          libvulkan-dev \
          mesa-vulkan-drivers \
          xvfb

    - name: Restore SCons build cache
      uses: actions/cache@v4
      with:
        path: .scons_cache
        key: scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-${{ github.sha }}
        restore-keys: |
          scons-linux-${{ hashFiles('SConstruct', 'methods.py') }}-
          scons-linux-

    - name: Build module-enabled Godot editor
      run: |
        scons platform=linuxbsd target=editor dev_build=yes tests=yes cache_path=.scons_cache cache_limit=10 -j"$(nproc)"

    - name: Resolve module-enabled Godot binary
      id: godot_binary
      run: |
        GODOT_BIN="$(find bin -maxdepth 1 -type f -executable -name 'godot*linuxbsd*editor*' | head -n 1)"
        if [ -z "$GODOT_BIN" ]; then
          echo "Could not locate built Godot editor binary in bin"
          ls -la bin
          exit 1
        fi
        echo "path=$GODOT_BIN" >> "$GITHUB_OUTPUT"
        echo "GODOT_BINARY=$GODOT_BIN" >> "$GITHUB_ENV"
        echo "Using module-enabled binary: $GODOT_BIN"

    - name: Verify module-enabled Godot installation
      run: |
        "$GODOT_BINARY" --version
        echo "Module-enabled Godot binary is accessible"

    - name: Setup virtual display
      run: |
        export DISPLAY=:99
        sudo Xvfb :99 -screen 0 1920x1080x24 &
        sleep 3

    - name: Import Godot project
      env:
        DISPLAY: :99
      run: |
        mkdir -p ~/.config/godot
        mkdir -p ~/.local/share/godot
        "$GODOT_BINARY" --headless --import 2>&1 || true
        echo "Project import step completed"

    - name: Generate test data
      run: |
        if [ -f "test_data/generate_test_data.py" ]; then
          cd test_data
          python3 generate_test_data.py
          echo "Test data generated"
        else
          echo "No test data generator found, proceeding without pre-generated data"
        fi

    - name: Run baseline QA tests
      env:
        DISPLAY: :99
        GS_CI_GPU_REQUIRED: "0"
      run: |
        python3 tests/ci/run_baseline_qa.py --categories ply,pipeline,runtime,module
      continue-on-error: false

    - name: Collect test results
      if: always()
      run: |
        echo "Collecting test result files..."

        # Collect JSON results from user directory
        if [ -d "$HOME/.local/share/godot/app_userdata" ]; then
          find "$HOME/.local/share/godot/app_userdata" -name "*test_results.json" -exec cp {} . \;
        fi

        # Collect main test result
        if [ -f "baseline_qa_results.json" ]; then
          echo "Main test results found"
        else
          echo "Main test results not found"
        fi

        # List all collected files
        ls -la *.json || echo "No JSON files found"

    - name: Generate test summary
      if: always()
      run: |
        echo "# Baseline QA Test Results (CPU)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f "baseline_qa_results.json" ]; then
          # Parse JSON results
          TOTAL=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['total_tests'])")
          PASSED=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['passed_tests'])")
          FAILED=$(python3 -c "import json; data=json.load(open('baseline_qa_results.json')); print(data['failed_tests'])")

          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY

          SUCCESS_RATE=$(python3 -c "print(round($PASSED/$TOTAL*100, 1) if $TOTAL > 0 else 0)")
          echo "| Success Rate | ${SUCCESS_RATE}% |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Details" >> $GITHUB_STEP_SUMMARY

        python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
        import json

        data = json.load(open("baseline_qa_results.json", encoding="utf-8"))
        for test in data["tests"]:
            status = "PASS" if test["success"] else "FAIL"
            print(f"- {status} **{test['name']}** ({test['duration']:.1f}s)")
            if not test["success"] and test.get("stderr"):
                print(f"  - Error: {test['stderr'][:100]}...")
        PY

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Failure Analysis" >> $GITHUB_STEP_SUMMARY
            echo "Please check the job logs for actionable failure analysis." >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "Test results file not found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: baseline-qa-cpu-results
        path: |
          baseline_qa_results.json
          tests/ci/qa_results.json
          *test_results.json
          *.log
        if-no-files-found: warn
        retention-days: 30

    - name: Comment on PR (success only)
      if: github.event_name == 'pull_request' && success()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          let comment = '## Baseline QA Test Results (CPU)\n\n';

          try {
            const results = JSON.parse(fs.readFileSync('baseline_qa_results.json', 'utf8'));

            const total = results.total_tests;
            const passed = results.passed_tests;
            const successRate = total > 0 ? (passed/total*100).toFixed(1) : 0;

            comment += '| Test Suite | Status | Details |\n';
            comment += '|------------|--------|---------|\n';

            for (const test of results.tests) {
              const status = test.success ? 'PASS' : 'FAIL';
              const duration = test.duration.toFixed(1);
              comment += `| ${test.name} | ${status} | ${duration}s |\n`;
            }

            comment += `\n**Summary:** ${passed}/${total} tests passed (${successRate}%)\n`;

          } catch (error) {
            comment += 'Could not parse test results. Check the job logs for details.\n';
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
