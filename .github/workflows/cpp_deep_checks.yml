name: Cpp Deep Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    branches: [master]
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - "tests/**"
      - "scripts/ci/**"
      - ".clang-tidy"
      - ".github/workflows/cpp_deep_checks.yml"
      - ".github/workflows/gaussian_production_gates.yml"
  push:
    branches: [master, develop]
    paths:
      - "core/**"
      - "drivers/**"
      - "editor/**"
      - "main/**"
      - "modules/**"
      - "platform/**"
      - "scene/**"
      - "servers/**"
      - "thirdparty/**"
      - "*.py"
      - "SConstruct"
      - "tests/**"
      - "scripts/ci/**"
      - ".clang-tidy"
      - ".github/workflows/cpp_deep_checks.yml"
      - ".github/workflows/gaussian_production_gates.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  linux-asan-ubsan-build:
    name: linux-asan-ubsan-build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify Python on runner
        run: python3 --version

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-tidy \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libvulkan-dev \
            mesa-vulkan-drivers

      - name: Install Python tooling
        run: |
          python3 -m pip install --upgrade pip

      - name: Build Godot editor with sanitizer coverage
        run: |
          scons platform=linuxbsd target=editor dev_build=yes tests=yes use_asan=yes use_ubsan=yes compiledb=yes cache_path=.scons_cache cache_limit=10 -j"$(nproc)"

      - name: Resolve Godot binary
        id: godot_bin
        run: |
          set -euo pipefail
          godot_bin="$(find bin -maxdepth 1 -type f -executable -name 'godot*linuxbsd*editor*' | sort | head -n 1)"
          if [[ -z "${godot_bin}" ]]; then
            echo "Could not locate built Linux editor binary in bin/"
            ls -la bin || true
            exit 1
          fi
          echo "path=${godot_bin}" >> "$GITHUB_OUTPUT"
          echo "Using sanitized binary: ${godot_bin}"

      - name: Stage binary artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts/sanitized/bin
          cp "${{ steps.godot_bin.outputs.path }}" artifacts/sanitized/bin/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-asan-ubsan-binary
          path: artifacts/sanitized/bin/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload compile commands artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-asan-ubsan-compile-commands
          path: compile_commands.json
          if-no-files-found: warn
          retention-days: 14

  linux-module-tests:
    name: linux-module-tests
    runs-on: ubuntu-latest
    needs: linux-asan-ubsan-build
    timeout-minutes: 60
    env:
      ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libvulkan-dev \
            mesa-vulkan-drivers

      - name: Download sanitized build artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-asan-ubsan-binary
          path: .

      - name: Resolve Godot binary
        id: godot_bin
        run: |
          set -euo pipefail
          godot_bin="$(find . -maxdepth 5 -type f -name 'godot*linuxbsd*editor*' | sort | head -n 1)"
          if [[ -z "${godot_bin}" ]]; then
            echo "Could not locate downloaded Linux editor binary artifact."
            find . -maxdepth 3 -type f -name 'godot*' -print || true
            exit 1
          fi
          chmod +x "${godot_bin}"
          echo "path=${godot_bin}" >> "$GITHUB_OUTPUT"
          echo "Using sanitized binary: ${godot_bin}"

      - name: Run module tests
        run: |
          python3 tests/ci/run_module_tests.py --godot-binary "${{ steps.godot_bin.outputs.path }}"

  linux-runtime-cpp-smoke:
    name: linux-runtime-cpp-smoke
    runs-on: ubuntu-latest
    needs: linux-asan-ubsan-build
    timeout-minutes: 60
    env:
      ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libvulkan-dev \
            mesa-vulkan-drivers

      - name: Download sanitized build artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-asan-ubsan-binary
          path: .

      - name: Resolve Godot binary
        id: godot_bin
        run: |
          set -euo pipefail
          godot_bin="$(find . -maxdepth 5 -type f -name 'godot*linuxbsd*editor*' | sort | head -n 1)"
          if [[ -z "${godot_bin}" ]]; then
            echo "Could not locate downloaded Linux editor binary artifact."
            find . -maxdepth 3 -type f -name 'godot*' -print || true
            exit 1
          fi
          chmod +x "${godot_bin}"
          echo "path=${godot_bin}" >> "$GITHUB_OUTPUT"
          echo "Using sanitized binary: ${godot_bin}"

      - name: Run runtime smoke validation
        run: |
          python3 tests/runtime/run_runtime_validation.py \
            --profile smoke \
            --godot-binary "${{ steps.godot_bin.outputs.path }}" \
            --gd-mode headless \
            --fail-on-skip

      - name: Upload runtime smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-runtime-cpp-smoke-report
          path: tests/runtime/runtime_validation_report.json
          if-no-files-found: warn
          retention-days: 14

  clang-tidy-diff:
    name: clang-tidy-diff
    runs-on: ubuntu-latest
    needs: linux-asan-ubsan-build
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Download compile commands artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-asan-ubsan-compile-commands
          path: .

      - name: Verify compile commands
        run: |
          set -euo pipefail
          test -f compile_commands.json
          echo "compile_commands.json is available for clang-tidy diff analysis"

      - name: Run clang-tidy diff
        run: |
          python3 scripts/ci/run_clang_tidy_diff.py
